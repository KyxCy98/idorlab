<!DOCTYPE html>
<html>
<head>
    <title>Login - Employee Portal</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .container { max-width: 300px; margin: auto; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Akun demo: <strong>user/user123</strong> atau <strong>admin/admin123</strong></p>
    </div>
</body>
</html>
